name: Mark stale issues and PRs

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been open for 60 days with no activity.
            It will be closed in 14 days unless there is new activity.
            If this is still relevant, please leave a comment.
          stale-pr-message: >
            This PR has been open for 60 days with no activity.
            It will be closed in 14 days unless there is new activity.
            If you're still working on it, please leave a comment or push an update.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this becomes relevant again.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen when ready.
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security"
